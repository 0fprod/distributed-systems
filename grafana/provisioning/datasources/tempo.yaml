apiVersion: 1
datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    jsonData:
      # Jump from a span directly to the Loki logs for that service/time range.
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: true
      # Enable "Search" tab in Explore using Loki labels.
      lokiSearch:
        datasourceUid: loki
