apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: distributed-systems
data:
  nginx.conf: |
    # Browser direct navigation sends Accept: text/html — route to SPA.
    # fetch() requests send Accept: */* — proxy to backend.
    map $http_accept $is_browser_nav {
        default     0;
        "~*text/html" 1;
    }

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:;";

        # K8s DNS resolves "backend" to the ClusterIP of the backend Service.
        # No Docker-specific resolver or dynamic variable needed.

        location /invoices {
            if ($is_browser_nav) {
                rewrite ^ /index.html last;
            }
            proxy_pass http://backend:3000;
        }

        location /register {
            proxy_pass http://backend:3000;
        }

        location /login {
            proxy_pass http://backend:3000;
        }

        location /logout {
            proxy_pass http://backend:3000;
        }

        location /me {
            proxy_pass http://backend:3000;
        }

        location /ws {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
