apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-trigger-secret
  namespace: distributed-systems
type: Opaque
stringData:
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq.distributed-systems.svc.cluster.local:5672"
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-trigger-auth
  namespace: distributed-systems
spec:
  secretTargetRef:
    - parameter: host
      name: rabbitmq-trigger-secret
      key: RABBITMQ_URL
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaledobject
  namespace: distributed-systems
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        queueName: worker.invoices.created
        mode: QueueLength
        value: "5"
      authenticationRef:
        name: rabbitmq-trigger-auth
