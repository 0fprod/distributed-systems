apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: distributed-systems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          # Image pushed to OCIR — run `terraform output image_worker` to get the full path.
          image: ghcr.io/0fprod/distributed-systems/worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          env:
            - name: OTEL_SERVICE_NAME
              value: worker
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: tmp
          emptyDir: {}
