apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: distributed-systems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: distributed-systems-worker:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          env:
            - name: OTEL_SERVICE_NAME
              value: worker
