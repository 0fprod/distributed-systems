apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: distributed-systems
data:
  OTEL_TRACES_EXPORTER: "otlp"
  # Alloy runs as a DaemonSet in the monitoring namespace and receives OTLP
  # from all pods, then forwards to Grafana Cloud.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4318"
  PRISMA_GENERATE_SKIP_AUTOINSTALL: "true"
