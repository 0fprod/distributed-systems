# Plain-text Secret template — fill locally, seal with kubeseal, NEVER commit with real values.
#
# Workflow:
#   1. Install controller (done by Terraform): helm install sealed-secrets ...
#   2. Install CLI:  brew install kubeseal
#   3. Back up master key: kubectl get secret -n kube-system \
#        -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml \
#        > sealed-secrets-master-key-BACKUP.yaml   ← store OUTSIDE the repo
#   4. Copy and fill: cp k8s/secret.template.yaml /tmp/app-secret.yaml
#      Replace each <PLACEHOLDER>:
#        MYSQL_ROOT_PASSWORD  → openssl rand -base64 32
#        RABBITMQ_USER        → any name except "guest"
#        RABBITMQ_PASSWORD    → openssl rand -base64 24
#        JWT_SECRET           → openssl rand -base64 64
#   5. Seal:
#        kubeseal --namespace distributed-systems --format yaml \
#          < /tmp/app-secret.yaml > k8s/sealed-secret.yaml
#   6. Shred: shred -u /tmp/app-secret.yaml
#   7. Commit k8s/sealed-secret.yaml (safe — encrypted with cluster key)
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: distributed-systems
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "<MYSQL_ROOT_PASSWORD>"
  DATABASE_URL: "mysql://root:<MYSQL_ROOT_PASSWORD>@proxysql:6033/invoices"
  RABBITMQ_URL: "amqp://<RABBITMQ_USER>:<RABBITMQ_PASSWORD>@rabbitmq:5672"
  RABBITMQ_USER: "<RABBITMQ_USER>"
  RABBITMQ_PASSWORD: "<RABBITMQ_PASSWORD>"
  JWT_SECRET: "<JWT_SECRET>"
