# Browser direct navigation sends Accept: text/html — route to SPA.
# fetch() requests send Accept: */* — proxy to backend.
map $http_accept $is_browser_nav {
    default     0;
    "~*text/html" 1;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver and defer resolution to request time.
    resolver 127.0.0.11 valid=30s;
    set $backend http://backend:3000;

    # Proxy API requests to the backend service.
    location /invoices {
        if ($is_browser_nav) {
            rewrite ^ /index.html last;
        }
        proxy_pass $backend;
    }

    location /register {
        proxy_pass $backend;
    }

    location /login {
        proxy_pass $backend;
    }

    location /logout {
        proxy_pass $backend;
    }

    location /me {
        proxy_pass $backend;
    }

    # Proxy WebSocket connections to the backend service.
    location /ws {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Prevent nginx from closing idle WebSocket connections (default: 60s).
        proxy_read_timeout 3600s;
    }

    # Serve static assets directly; fall back to index.html for SPA routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the SPA entry point so browsers always get fresh HTML.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
