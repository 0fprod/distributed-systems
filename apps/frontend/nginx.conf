server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver and defer resolution to request time.
    resolver 127.0.0.11 valid=30s;
    set $backend http://backend:3000;

    # Proxy API requests to the backend service.
    location /invoices {
        proxy_pass $backend;
    }

    # Proxy WebSocket connections to the backend service.
    location /ws {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Prevent nginx from closing idle WebSocket connections (default: 60s).
        proxy_read_timeout 3600s;
    }

    # Serve static assets directly; fall back to index.html for SPA routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the SPA entry point so browsers always get fresh HTML.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
